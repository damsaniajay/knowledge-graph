openapi: "3.0.0"
info:
  title: Airtel Plan Change API
  version: "2.0.0"
paths:
  /auth/login:
    post:
      summary: Authenticate user via OTP-based login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [msisdn, otp]
              properties:
                msisdn: { type: string }
                otp:    { type: string }
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid OTP

  /auth/token/refresh:
    post:
      summary: Refresh session token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: Token refreshed

  /plans:
    get:
      summary: Fetch plans — current or recommended (parameterized)
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [current, recommended]
          required: true
        - name: msisdn
          in: query
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Plans list

  /plans/switch:
    post:
      summary: Create a plan switch order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [msisdn, plan_id, promo_code]
              properties:
                msisdn:     { type: string }
                plan_id:    { type: string }
                promo_code: { type: string }
      responses:
        "200":
          description: Order created
        "400":
          description: Invalid plan or promo code

  /payments/pay:
    post:
      summary: Process payment for plan switch order
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [order_id, payment_method, amount]
              properties:
                order_id:       { type: string }
                payment_method: { type: string, enum: [upi, card, wallet, bnpl] }
                amount:         { type: number }
      responses:
        "200":
          description: Payment successful
        "402":
          description: Payment failed

  /payments/activate:
    post:
      summary: Activate new plan and send confirmation SMS
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [order_id, notify_sms]
              properties:
                order_id:   { type: string }
                notify_sms: { type: boolean }
      responses:
        "200":
          description: Plan activated with SMS confirmation
        "404":
          description: Order not found
