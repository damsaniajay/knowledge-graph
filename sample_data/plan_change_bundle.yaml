kind: knowledge_graph_bundle
title: Plan Change — basic setup
openapi:
  openapi: 3.0.0
  info:
    title: Airtel Plan Change API
    version: 1.0.0
  paths:
    /auth/login:
      post:
        summary: Authenticate user and return session token
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - msisdn
                - password
                properties:
                  msisdn:
                    type: string
                  password:
                    type: string
        responses:
          '200':
            description: Login successful
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    token:
                      type: string
                    user_id:
                      type: string
          '401':
            description: Invalid credentials
    /auth/token/refresh:
      post:
        summary: Refresh session token
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - refresh_token
                properties:
                  refresh_token:
                    type: string
        responses:
          '200':
            description: Token refreshed
    /plans:
      get:
        summary: Fetch plans — current or recommended (parameterized)
        parameters:
        - name: type
          in: query
          schema:
            type: string
            enum:
            - current
            - recommended
          required: true
        - name: msisdn
          in: query
          schema:
            type: string
          required: true
        responses:
          '200':
            description: Plans list
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    plans:
                      type: array
          '401':
            description: Unauthorized — missing or invalid session
    /plans/switch:
      post:
        summary: Create a plan switch order
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - msisdn
                - plan_id
                properties:
                  msisdn:
                    type: string
                  plan_id:
                    type: string
        responses:
          '200':
            description: Order created
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    order_id:
                      type: string
          '400':
            description: Invalid plan
    /plans/eligibility-check:
      post:
        summary: Validate subscriber eligibility for selected plan
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - msisdn
                - plan_id
                properties:
                  msisdn:
                    type: string
                  plan_id:
                    type: string
        responses:
          '200':
            description: Eligibility result
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    eligible:
                      type: boolean
                    reason:
                      type: string
          '400':
            description: Invalid request
    /payments/pay:
      post:
        summary: Process payment for plan switch order
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - order_id
                - payment_method
                - amount
                properties:
                  order_id:
                    type: string
                  payment_method:
                    type: string
                    enum:
                    - upi
                    - card
                    - wallet
                  amount:
                    type: number
        responses:
          '200':
            description: Payment successful
          '402':
            description: Payment failed
    /payments/activate:
      post:
        summary: Activate new plan after successful payment
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - order_id
                properties:
                  order_id:
                    type: string
        responses:
          '200':
            description: Plan activated
          '404':
            description: Order not found
    /payments/initiate:
      post:
        summary: Start OTP-based payment for plan switch (modified flow)
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - order_id
                - payment_method
                properties:
                  order_id:
                    type: string
                  payment_method:
                    type: string
        responses:
          '200':
            description: Payment initiated; OTP sent
    /payments/verify-otp:
      post:
        summary: Verify payment OTP (modified flow)
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - order_id
                - otp
                properties:
                  order_id:
                    type: string
                  otp:
                    type: string
        responses:
          '200':
            description: Payment verified
          '400':
            description: Invalid OTP
    /plans/activate:
      post:
        summary: Activate selected plan after verified payment (modified flow)
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - order_id
                properties:
                  order_id:
                    type: string
        responses:
          '200':
            description: Plan activated
          '404':
            description: Order not found
    /support/tickets:
      post:
        summary: Raise a customer support ticket (unrelated to plan change flow)
        requestBody:
          content:
            application/json:
              schema:
                type: object
                required:
                - msisdn
                - issue_type
                - description
                properties:
                  msisdn:
                    type: string
                  issue_type:
                    type: string
                  description:
                    type: string
        responses:
          '201':
            description: Ticket created
    /profile/details:
      get:
        summary: Fetch subscriber profile details (unrelated to plan change flow)
        parameters:
        - name: msisdn
          in: query
          schema:
            type: string
          required: true
        responses:
          '200':
            description: Profile details
    /vas/subscriptions:
      get:
        summary: List active value-added services (unrelated to plan change flow)
        parameters:
        - name: msisdn
          in: query
          schema:
            type: string
          required: true
        responses:
          '200':
            description: Active VAS subscriptions
features:
- name: Login
  description: Authenticates the user and returns a session token
  apis_used:
  - /auth/login
  - /auth/token/refresh
  depends_on: []
- name: Payment
  description: Processes payment and activates the new plan
  apis_used:
  - /payments/pay
  - /payments/activate
  depends_on:
  - PlanSwitch
- name: PlanFetch
  description: Fetches current and recommended plans for the subscriber
  apis_used:
  - /plans
  depends_on:
  - Login
- name: PlanSwitch
  description: Switches the subscriber to a selected plan
  apis_used:
  - /plans/switch
  depends_on:
  - PlanFetch
- name: EligibilityCheck
  description: Validates whether subscriber is eligible for the selected plan
  apis_used:
  - /plans/eligibility-check
  depends_on:
  - PlanFetch
- name: PaymentInitiate
  description: Starts OTP-based payment for plan switch (modified payment journey)
  apis_used:
  - /payments/initiate
  depends_on:
  - PlanSwitch
- name: PaymentVerifyOtp
  description: Verifies payment OTP before plan activation (modified payment journey)
  apis_used:
  - /payments/verify-otp
  depends_on:
  - PaymentInitiate
- name: PlanActivate
  description: Activates the selected plan after payment verification (modified payment journey)
  apis_used:
  - /plans/activate
  depends_on:
  - PaymentVerifyOtp
- name: SupportTicket
  description: Raises customer support tickets; intentionally unrelated to plan change journey
  apis_used:
  - /support/tickets
  depends_on:
  - Login
- name: ProfileView
  description: Reads subscriber profile information; unrelated to plan change journey
  apis_used:
  - /profile/details
  depends_on:
  - Login
- name: VASOverview
  description: Lists active value-added services; unrelated to plan change journey
  apis_used:
  - /vas/subscriptions
  depends_on:
  - Login
test_cases:
- tc_id: TC-login-001
  linked_to: Login
  title: Valid login with correct credentials
  type: positive
  test_layer: api
  steps:
  - Enter valid MSISDN: 9876543210
  - Enter correct password
  - Submit login form
  expected_result: HTTP 200 — session token returned
- tc_id: TC-login-002
  linked_to: Login
  title: Login with wrong password
  type: negative
  test_layer: api
  steps:
  - Enter valid MSISDN
  - Enter incorrect password
  - Submit login form
  expected_result: HTTP 401 — invalid credentials
- tc_id: TC-API-login-401
  linked_to: POST:/auth/login
  title: Login API returns 401 for invalid credentials
  type: negative
  test_layer: api
  steps:
  - POST /auth/login with valid msisdn and wrong password
  expected_result: HTTP 401 — Invalid credentials
- tc_id: TC-planfetch-001
  linked_to: PlanFetch
  title: Fetch current and recommended plans successfully
  type: positive
  test_layer: api
  steps:
  - User is logged in with valid token
  - Call GET /plans?type=current
  - Call GET /plans?type=recommended
  expected_result: HTTP 200 — current and recommended plans returned
- tc_id: TC-planfetch-002
  linked_to: PlanFetch
  title: Fetch plans without authentication
  type: negative
  test_layer: api
  steps:
  - Call GET /plans?type=current without session token
  expected_result: HTTP 401 — unauthorized
user_story:
  title: Plan Change
  content: As a subscriber, I want to change my current mobile plan so that I can
    get better benefits. The user must call POST /auth/login to authenticate, use
    GET /plans to view current and recommended plans, POST /plans/switch to select
    a new plan, then POST /payments/pay and POST /payments/activate to complete payment
    and activation.
  depends_on: []
  blocked_by: []
